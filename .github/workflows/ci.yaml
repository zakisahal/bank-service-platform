name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  service-test:
    name: Service unit tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bank
          POSTGRES_PASSWORD: bank
          POSTGRES_DB: bank
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U bank -d bank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: go vet
        run: go vet ./...

      - name: Apply migrations (schema, then least-privilege roles)
        env:
          PGPASSWORD: bank
        run: |
          for f in migrations/*.sql; do
            echo "applying $f"
            if [ "$(basename "$f")" = "0003_roles.sql" ]; then
              psql -h localhost -U bank -d bank -v ON_ERROR_STOP=1 \
                -v api_password="ci-api-password" \
                -v consumer_password="ci-consumer-password" \
                -f "$f"
            else
              psql -h localhost -U bank -d bank -v ON_ERROR_STOP=1 -f "$f"
            fi
          done

      - name: go test
        env:
          # Set so internal/events' idempotency test runs for real in CI
          # instead of skipping. The actual code under test (c.handle)
          # connects as the least-privilege consumer role created above,
          # same as production; ADMIN_TEST_DATABASE_URL is only used by the
          # test's own assertions, which need to read audit_log - a table
          # bank_service_consumer can INSERT into but not SELECT from.
          TEST_DATABASE_URL: postgres://bank_service_consumer:ci-consumer-password@localhost:5432/bank?sslmode=disable
          ADMIN_TEST_DATABASE_URL: postgres://bank:bank@localhost:5432/bank?sslmode=disable
        run: go test ./... -race -cover

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker-build:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    needs: service-test
    strategy:
      matrix:
        target: [api, consumer]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target }} image
        run: docker build --target ${{ matrix.target }} -t bank-${{ matrix.target == 'api' && 'service' || 'consumer' }}:${{ github.sha }} service

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: bank-${{ matrix.target == 'api' && 'service' || 'consumer' }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1" # fails the job - and blocks merge if this check is required in branch protection

  helm:
    name: Helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - run: helm lint deploy/helm/bank-service
      - run: helm template test deploy/helm/bank-service > /dev/null
      - run: helm template test deploy/helm/bank-service --set postgres.enabled=true --set redis.enabled=true --set consumer.enabled=true --set monitoring.serviceMonitor.enabled=true > /dev/null
      - run: helm template test deploy/helm/bank-service --set autoscaling.strategy=hpa > /dev/null
      - run: helm template test deploy/helm/bank-service --set ingress.enabled=true > /dev/null

  terraform:
    name: Terraform fmt + validate + plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # only used if the OIDC step below actually runs
    defaults:
      run:
        working-directory: infra/terraform/envs/dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - run: terraform fmt -check -recursive ../../..
      - run: terraform init -backend=false -input=false
      - run: terraform validate

      # Everything above needs no AWS access at all and always runs. This
      # step is the real thing - an actual `terraform plan` against a real
      # account through the read-only terraform_plan OIDC role
      # (modules/iam; sub claim scoped to
      # repo:<org>/<repo>:pull_request, so it's safe to run unattended on
      # every PR). It's conditional on TF_PLAN_ROLE_ARN being configured
      # (Settings > Secrets and variables > Actions > Variables) so this
      # workflow stays green in a fresh clone of this repo before that
      # role exists in a real AWS account - once it's set, this runs for
      # real and stops being a no-op.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.TF_PLAN_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: terraform plan (real, via OIDC)
        if: ${{ vars.TF_PLAN_ROLE_ARN != '' }}
        run: terraform plan -input=false -no-color
        # Runs against the local backend declared in versions.tf, same as
        # everywhere else in this repo (see versions.tf's commented S3+
        # DynamoDB block) - state from this run doesn't persist between CI
        # runs, which is a real limitation, not a hidden one. Wiring the
        # remote backend needs the backend's own S3 bucket/DynamoDB table
        # to exist first (the classic Terraform bootstrapping
        # chicken-and-egg), which is out of scope for this PR-triggered
        # plan-only step - see DECISIONS.md.

      - name: terraform plan skipped
        if: ${{ vars.TF_PLAN_ROLE_ARN == '' }}
        run: echo "TF_PLAN_ROLE_ARN not set - skipping the real plan-via-OIDC step. fmt/validate above already ran. See DECISIONS.md."

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
