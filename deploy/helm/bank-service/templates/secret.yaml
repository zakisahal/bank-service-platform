{{- if .Values.secrets.create }}
# Demo-only, all three. In AWS none of these are Helm-managed Secrets at
# all: External Secrets Operator syncs each one from its own Secrets
# Manager entry (one per role, matching the least-privilege split in
# service/migrations/0003_roles.sql), scoped to be readable only by the
# matching IRSA role. See DECISIONS.md "Credential handling".
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bank-service.adminSecretName" . }}
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  DATABASE_URL: {{ include "bank-service.adminDatabaseUrl" . | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bank-service.appSecretName" . }}
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  DATABASE_URL: {{ include "bank-service.apiDatabaseUrl" . | quote }}
  PASSWORD: {{ .Values.secrets.apiPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "bank-service.consumerSecretName" . }}
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
type: Opaque
stringData:
  DATABASE_URL: {{ include "bank-service.consumerDatabaseUrl" . | quote }}
  PASSWORD: {{ .Values.secrets.consumerPassword | quote }}
{{- end }}
