{{- if .Values.redis.enabled }}
# Dev-only Redis backing the event stream for a self-contained minikube
# demo. Not used in production - see DECISIONS.md "Messaging tier" for the
# managed alternative (ElastiCache/MemoryDB, or a hosted broker) and why a
# bare Redis is enough for this exercise's scope.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bank-service.fullname" . }}-redis
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bank-service.fullname" . }}-redis
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-dev
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
