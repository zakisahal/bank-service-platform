{{- if .Values.postgres.enabled }}
# Dev-only Postgres for a self-contained minikube demo - not used in
# production (RDS instead, see infra/terraform/modules/rds). No PVC:
# storage is ephemeral, which is fine for this smoke-test purpose only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bank-service.fullname" . }}-postgres
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-dev
  annotations:
    # Runs as a hook (not a plain template) purely so it's created before the
    # pre-install migration Job below - a pre-install hook runs before any
    # non-hook resource in the release, so without this the migration Job
    # would race a Postgres that doesn't exist yet. No hook-delete-policy is
    # set, so unlike the migration Job this stays running after success.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.secrets.adminUser | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.secrets.adminPassword | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.secrets.database | quote }}
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.secrets.adminUser | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bank-service.fullname" . }}-postgres
  labels:
    {{- include "bank-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-dev
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
